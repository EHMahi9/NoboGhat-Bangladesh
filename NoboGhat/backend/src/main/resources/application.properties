spring.config.import=optional:file:.env[.properties]
spring.application.name=noboghat
server.port=${PORT:${SERVER_PORT:8080}}

spring.datasource.url=${SPRING_DATASOURCE_URL:${DB_URL}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${DB_USERNAME}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${DB_PASSWORD}}

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Use a long, private value for JWT_SECRET outside local development. Keeping it
# configurable prevents valid tokens from becoming invalid every application restart.
app.jwt.secret=${JWT_SECRET:local-development-secret-change-this-to-at-least-32-characters}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:36000000}
app.frontend-url=${FRONTEND_URL:https://noboghatbangladesh.vercel.app}

app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:https://noboghatbangladesh.vercel.app,http://localhost:5500,http://127.0.0.1:5500}

management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
