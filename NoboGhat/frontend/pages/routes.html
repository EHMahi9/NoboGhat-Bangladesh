<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Available Trips | NoboGhat</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="../assets/css/navbar.css">
    <link rel="stylesheet" href="../assets/css/footer.css">
    <link rel="stylesheet" href="../assets/css/routes.css">
</head>
<body>
    <nav class="navbar">
        <a href="../index.html" class="logo-link">
            <img src="../assets/images/illustrations/noboghat-svg.svg" alt="NoboGhat Logo" class="logo">
        </a>
        <ul class="nav-links">
            <li><a href="../index.html">Home</a></li>
            <li><a href="routes.html" class="active-link">Shipments</a></li>
            <li><a href="dashboard.html">Dashboard</a></li>
        </ul>
        <a href="../index.html#register" class="btn-primary">Register</a>

        <div class="hamburger">
            <span class="bar"></span>
            <span class="bar"></span>
            <span class="bar"></span>
        </div>
    </nav>

    <main>
        <header class="routes-header">
            <div class="container">
                <h1>Find Available Cargo Space</h1>
                <p>Search verified river routes across Bangladesh.</p>

                <form id="routeSearchForm" class="advanced-search-form">
                    <label for="searchSource" class="sr-only">From</label>
                    <input type="text" id="searchSource" placeholder="From (e.g., Sadarghat)" title="Departure location" required>
                    <label for="searchDestination" class="sr-only">To</label>
                    <input type="text" id="searchDestination" placeholder="To (e.g., Khulna)" title="Destination location" required>
                    <label for="searchDate" class="sr-only">Date</label>
                    <input type="date" id="searchDate" title="Travel date" required>
                    <button type="submit" class="btn-search">
                        <i class="fa-solid fa-magnifying-glass"></i> Search
                    </button>
                </form>
                <p id="routesError" class="error-text" hidden></p>
            </div>
        </header>

        <section class="booking-section" id="bookingSection" hidden>
            <div class="container">
                <div class="booking-panel">
                    <div class="booking-panel-header">
                        <div>
                            <p class="booking-eyebrow">Book Cargo</p>
                            <h2>Confirm your booking</h2>
                        </div>
                        <button type="button" class="booking-close" id="closeBookingPanel" aria-label="Close booking panel">&times;</button>
                    </div>

                    <div class="booking-details" id="bookingTripDetails"></div>

                    <form id="bookingForm" class="booking-form">
                        <input type="hidden" id="bookingTripId">
                        <label for="bookingCargoWeight">Cargo weight (kg)</label>
                        <input type="number" id="bookingCargoWeight" min="1" step="0.1" placeholder="Enter cargo weight" required>
                        <button type="submit" class="btn-book">Confirm Booking</button>
                    </form>

                    <p id="bookingMessage" class="booking-message" hidden></p>
                </div>
            </div>
        </section>

        <section class="trips-section">
            <div class="container">
                <div class="section-title-bar">
                    <h2>Scheduled Departures</h2>
                    <span class="results-count" id="resultsCount">Loading trips...</span>
                </div>

                <div id="tripResults" class="trips-grid" aria-live="polite"></div>
            </div>
        </section>
    </main>

    <footer id="contact" class="site-footer">
        <div class="footer-bottom">
            <p>&copy; 2026 NoboGhat. All rights reserved. Developed by <span id="Mahi">Ebnul Hasan Mahi</span>.</p>
        </div>
    </footer>

    <script src="../assets/js/api.js"></script>
    <script src="../assets/js/routes.js"></script>
    <script src="../assets/js/navbar.js"></script>
    <script src="../assets/js/main.js"></script>
</body>
</html>
