<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard - NoboGhat</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="../assets/css/navbar.css">
</head>
<body class="admin-page" data-requires-auth="true" data-requires-admin="true">

    <!-- Reusable Navbar -->
    <nav class="navbar">
        <a href="../index.html" class="logo-link">
            <img src="../assets/images/illustrations/noboghat-svg.svg" alt="NoboGhat Logo" class="logo">
        </a>
        <ul class="nav-links">
            <li><a href="../index.html">Home</a></li>
            <li><a href="routes.html">Shipments</a></li>
            <li><a href="dashboard.html">Dashboard</a></li>
            <li><a href="admin.html" class="active-link">Admin</a></li>
        </ul>
        <a href="login.html" class="btn-primary" data-action="logout">Logout</a>
        <div class="hamburger">
            <span class="bar"></span>
            <span class="bar"></span>
            <span class="bar"></span>
        </div>
    </nav>

    <main style="padding: 40px 5%;">
        <h1>Admin Analytics Summary</h1>
        
        <!-- Analytics Summary Cards -->
        <div class="dashboard-cards">
            <div class="card"><h3>Total Users</h3><p id="totalUsers">0</p></div>
            <div class="card"><h3>Total Boats</h3><p id="totalBoats">0</p></div>
            <div class="card"><h3>Total Bookings</h3><p id="totalBookings">0</p></div>
            <div class="card"><h3>Total Cargo Weight</h3><p id="totalCargoWeight">0 kg</p></div>
        </div>
        <div class="booking-panel" style="margin-top: 32px;">
            <h2>Manage Boats</h2>
            <form id="boatForm" class="booking-form">
                <label for="boatName">Boat Name</label>
                <input type="text" id="boatName" required>
                <label for="boatCapacity">Capacity</label>
                <input type="number" id="boatCapacity" min="1" step="0.1" required>
                <button type="submit" class="btn-book">Save Boat</button>
            </form>
            <p id="boatMessage" class="booking-message" hidden></p>
            <div class="table-responsive" style="margin-top: 20px;">
                <table class="history-table">
                    <thead><tr><th>Name</th><th>Capacity</th><th>Action</th></tr></thead>
                    <tbody id="boatsBody"><tr><td colspan="3">Loading boats...</td></tr></tbody>
                </table>
            </div>
        </div>
        <p id="dashboardError" hidden></p>
    </main>

    <!-- Scripts -->
    <script src="../assets/js/api.js"></script>
    <script src="../assets/js/session.js"></script>
    <script src="../assets/js/navbar.js"></script>
    <script src="../assets/js/admin.js"></script>
</body>
</html>
