<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 120" width="100%" height="100%">
  <!-- Minimal Bridge Silhouette -->
  <path d="M 10 70 Q 60 20 110 70" fill="none" stroke="#0F4C81" stroke-width="3" opacity="0.2"/>
  <rect x="34" y="42" width="2" height="28" fill="#0F4C81" opacity="0.2"/>
  <rect x="59" y="30" width="2" height="40" fill="#0F4C81" opacity="0.2"/>
  <rect x="84" y="42" width="2" height="28" fill="#0F4C81" opacity="0.2"/>

  <!-- Minimal Sun -->
  <circle cx="60" cy="20" r="8" fill="#2E8B57" opacity="0.9"/>

  <!-- Cargo Containers -->
  <!-- Container 1 (Bangladesh Green) -->
  <rect x="25" y="48" width="22" height="22" rx="2" fill="#2E8B57"/>
  <line x1="32" y1="48" x2="32" y2="70" stroke="#ffffff" stroke-width="1.5" opacity="0.3"/>
  <line x1="39" y1="48" x2="39" y2="70" stroke="#ffffff" stroke-width="1.5" opacity="0.3"/>
  
  <!-- Container 2 (River Blue) -->
  <rect x="50" y="48" width="22" height="22" rx="2" fill="#2F80ED"/>
  <line x1="57" y1="48" x2="57" y2="70" stroke="#ffffff" stroke-width="1.5" opacity="0.3"/>
  <line x1="64" y1="48" x2="64" y2="70" stroke="#ffffff" stroke-width="1.5" opacity="0.3"/>

  <!-- Modern Boat Cabin -->
  <rect x="75" y="48" width="18" height="22" rx="2" fill="#0F4C81"/>
  <rect x="80" y="53" width="8" height="8" rx="1" fill="#ffffff"/>
  <path d="M 72 48 L 96 48 L 94 44 L 74 44 Z" fill="#0F4C81"/>

  <!-- Cargo Boat Hull -->
  <path d="M 12 70 L 108 70 L 118 85 L 7 85 Z" fill="#0F4C81"/>

  <!-- Stylized River Waves -->
  <path d="M 0 95 Q 15 88 30 95 T 60 95 T 90 95 T 120 95" fill="none" stroke="#2F80ED" stroke-width="3" stroke-linecap="round"/>
  <path d="M 0 105 Q 15 98 30 105 T 60 105 T 90 105 T 120 105" fill="none" stroke="#2F80ED" stroke-width="3" stroke-linecap="round" opacity="0.5"/>

  <!-- Clean Typography -->
  <text x="140" y="80" font-family="system-ui, -apple-system, sans-serif" font-size="46" font-weight="900" fill="#0F4C81" letter-spacing="-1">Nobo<tspan fill="#2F80ED">Ghat</tspan></text>
</svg>
