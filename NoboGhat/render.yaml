services:
  - type: web
    name: noboghat-backend
    runtime: docker

    dockerfilePath: ./NoboGhat/backend/Dockerfile
    dockerContext: ./NoboGhat/backend

    plan: free
    region: oregon

    healthCheckPath: /actuator/health

    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: production

      - key: SPRING_JPA_HIBERNATE_DDL_AUTO
        value: update

      - key: FRONTEND_URL
        value: https://noboghatbangladesh.vercel.app

      - key: CORS_ALLOWED_ORIGINS
        value: https://noboghatbangladesh.vercel.app

      - key: JWT_SECRET
        sync: false

      - key: SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_CLIENT_ID
        sync: false

      - key: SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_CLIENT_SECRET
        sync: false

      - key: SPRING_DATASOURCE_URL
        sync: false

      - key: SPRING_DATASOURCE_USERNAME
        sync: false

      - key: SPRING_DATASOURCE_PASSWORD
        sync: false

databases:
  - name: noboghat-db
    databaseName: noboghat
    plan: free
    region: oregon